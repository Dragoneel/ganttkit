<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GanttKit · HTML renderer stress test</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }

    header {
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }

    header select,
    header button,
    header input {
      padding: 6px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
    }

    header button {
      cursor: pointer;
      font-weight: 600;
    }

    .wrap {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      align-items: flex-start;
    }

    #metrics {
      flex: 0 0 320px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .06);
    }

    caption {
      text-align: left;
      font-weight: 700;
      padding: 8px 10px;
    }

    td {
      padding: 5px 10px;
      border-top: 1px solid #f3f4f6;
    }

    td:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .good {
      color: #15803d;
    }

    .warn {
      color: #b45309;
    }

    .bad {
      color: #b91c1c;
    }

    #app {
      flex: 1 1 auto;
      height: 78vh;
      min-width: 0;
    }
  </style>
</head>

<body>
  <header>
    <strong>GanttKit · HTML stress test</strong>
    <label>Dataset
      <select id="size">
        <option value="100,4">100 rows × 4 (400 tasks)</option>
        <option value="500,4">500 rows × 4 (2k tasks)</option>
        <option value="1000,5" selected>1 000 rows × 5 (5k tasks)</option>
        <option value="2000,5">2 000 rows × 5 (10k tasks)</option>
        <option value="5000,4">5 000 rows × 4 (20k tasks)</option>
        <option value="10000,4">10 000 rows × 4 (40k tasks)</option>
        <option value="20000,4">20 000 rows × 4 (80k tasks)</option>
        <option value="50000,4">50 000 rows × 4 (200k tasks)</option>
        <option value="100000,4">100 000 rows × 4 (400k tasks)</option>
        <option value="200000,4">200 000 rows × 4 (800k tasks)</option>
      </select>
    </label>
    <button id="run">Run benchmark</button>
    <input id="search" type="search" placeholder="Filter tasks…" />
    <span style="color:#6b7280">drag · ctrl+wheel zoom · drag empty space to pan</span>
  </header>
  <div class="wrap">
    <div id="metrics"></div>
    <div id="app"></div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>

</html>
