<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GanttKit · HTML renderer example</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; background: #f3f4f6; }
      .toolbar { display: flex; gap: 8px; align-items: center; padding: 12px 16px; }
      .toolbar button { padding: 6px 12px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; }
      .toolbar button:hover { background: #f3f4f6; }
      #app { height: 70vh; margin: 0 16px 16px; }
      .log { margin: 0 16px; font: 12px/1.5 monospace; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <strong>GanttKit (HTML)</strong>
      <button id="expand">Expand all</button>
      <button id="collapse">Collapse all</button>
      <button id="baseline">Set baseline</button>
      <button id="clear-baseline">Clear baseline</button>
      <button id="theme">Toggle theme</button>
      <label>Lang
        <select id="locale">
          <option value="en">English</option>
          <option value="fr">Français</option>
          <option value="de">Deutsch</option>
        </select>
      </label>
      <input id="search" type="search" placeholder="Filter tasks…" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px" />
      <span style="color:#6b7280">· no SVG  every shape is a div · drag bars · ctrl+wheel zoom</span>
    </div>
    <div id="app"></div>
    <pre class="log" id="log"></pre>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
